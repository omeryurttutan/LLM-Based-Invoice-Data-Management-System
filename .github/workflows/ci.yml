name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ============================================
  # BACKEND (Spring Boot)
  # ============================================
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Verify Maven Project
        run: mvn verify -DskipTests

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: false

      - name: Run SpotBugs
        run: mvn spotbugs:check
        continue-on-error: false

      - name: Run Unit Tests
        run: mvn test

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          retention-days: 7

  # ============================================
  # FRONTEND (Next.js)
  # ============================================
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript Check
        run: npm run type-check

      - name: Run Tests
        run: npm run test -- --passWithNoTests --ci
        continue-on-error: true

      - name: Build Application
        run: npm run build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  # ============================================
  # EXTRACTION SERVICE (Python FastAPI)
  # ============================================
  extraction:
    name: Extraction Service CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./extraction-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: extraction-service/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run Ruff Linter
        run: ruff check src/ tests/ --output-format=github

      - name: Run Ruff Formatter Check
        run: ruff format --check src/ tests/

      - name: Run MyPy Type Check
        run: mypy src/ --ignore-missing-imports
        continue-on-error: true

      - name: Run Pytest
        run: pytest tests/ -v --tb=short --junitxml=pytest-results/results.xml
        continue-on-error: true

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: extraction-test-results
          path: extraction-service/pytest-results/
          retention-days: 7

  # ============================================
  # INTEGRATION CHECK
  # ============================================
  integration:
    name: Integration Check
    runs-on: ubuntu-latest
    needs: [backend, frontend, extraction]
    if: always()

    steps:
      - name: Check Results
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Extraction | ${{ needs.extraction.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Verify All Passed
        if: |
          needs.backend.result != 'success' ||
          needs.frontend.result != 'success' ||
          needs.extraction.result != 'success'
        run: |
          echo "❌ One or more checks failed!"
          exit 1

      - name: All Checks Passed
        run: echo "✅ All CI checks passed successfully!"
