<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Fatura OCR Bildirim</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 600px;
            margin: 20px auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .header {
            background-color: #007bff;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        .content {
            padding: 20px;
            line-height: 1.6;
            color: #333333;
        }
        .button {
            display: inline-block;
            background-color: #28a745;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #777777;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 th:text="${title}">Bildirim</h2>
        </div>
        <div class="content">
            <p>Merhaba <span th:text="${firstName}">Kullanıcı</span>,</p>
            <p th:text="${message}">Bildirim detayları burada yer alacak.</p>
            
            <div style="text-align: center;">
                <a th:if="${actionUrl}" th:href="${actionUrl}" class="button">Detayları Görüntüle</a>
            </div>
        </div>
        <div class="footer">
            <p>Bu e-posta Fatura OCR Sistemi tarafından otomatik olarak gönderilmiştir.</p>
            <p><a th:href="@{${frontendUrl} + '/settings/notifications'}">Bildirim Ayarlarını Yönet</a></p>
        </div>
    </div>
</body>
</html>
