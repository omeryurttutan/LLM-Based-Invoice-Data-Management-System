server:
  port: 8080

spring:
  application:
    name: fatura-ocr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/fatura_ocr_db}
    username: ${SPRING_DATASOURCE_USERNAME:fatura_user}
    password: ${SPRING_DATASOURCE_PASSWORD:fatura_secret_2026}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: true
    out-of-order: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6380}

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5673}
    username: ${SPRING_RABBITMQ_USERNAME:fatura_mq}
    password: ${SPRING_RABBITMQ_PASSWORD:mq_secret_2026}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-min-32-chars}
  access-token:
    expiration: 900000 # 15 minutes in milliseconds
  refresh-token:
    expiration: 604800000 # 7 days in milliseconds

# Security Configuration
security:
  password:
    bcrypt-strength: 12
  brute-force:
    max-attempts: 5
    lock-duration-minutes: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# File Upload Configuration
upload:
  storage-path: ${UPLOAD_STORAGE_PATH:/data/invoices}
  max-file-size: ${UPLOAD_MAX_FILE_SIZE_MB:20}MB
  max-bulk-total-size: ${UPLOAD_MAX_BULK_TOTAL_SIZE_MB:200}MB

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

export:
  logo:
    firm-number: "001"
    use-legacy-format: false
  netsis:
    branch-code: "0"
    use-legacy-format: false
  mikro:
    delimiter: ";"
    database-name: "MIKRO_DB"
  luca:
    firm-code: "100"
