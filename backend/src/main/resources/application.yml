server:
  port: 8082

springdoc:
  api-docs:
    path: /api/v1/api-docs
  swagger-ui:
    path: /api/docs
    enabled: true

spring:
  application:
    name: fatura-ocr-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://localhost:5436/fatura_ocr
    username: fatura
    password: fatura123
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 20000 # 20 seconds
      idle-timeout: 300000 # 5 minutes
      max-lifetime: 1200000 # 20 minutes
      leak-detection-threshold: 60000 # 60 seconds (detect connection leaks)

  mail:
    host: localhost
    port: 25
    username: user
    password: password
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jpa:
    properties:
      hibernate:
        generate_statistics: true
        session:
          events:
            log:
              pass: true
    show-sql: false

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6380}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 4
          max-wait: 2000ms

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5673}
    username: ${SPRING_RABBITMQ_USERNAME:fatura_mq}
    password: ${SPRING_RABBITMQ_PASSWORD:mq_secret_2026}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-for-jwt-token-generation-min-32-chars}
  access-token:
    expiration: 900000 # 15 minutes in milliseconds
  refresh-token:
    expiration: 604800000 # 7 days in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# File Upload Configuration
upload:
  storage-path: ${UPLOAD_STORAGE_PATH:/data/invoices}
  max-file-size: ${UPLOAD_MAX_FILE_SIZE_MB:20}MB
  max-bulk-total-size: ${UPLOAD_MAX_BULK_TOTAL_SIZE_MB:200}MB

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 200MB

export:
  logo:
    firm-number: "001"
    use-legacy-format: false
  netsis:
    branch-code: "0"
    use-legacy-format: false
  mikro:
    delimiter: ";"
    database-name: "MIKRO_DB"
  luca:
    firm-code: "100"

app:
  kvkk:
    encryption:
      enabled: true
      key-env-variable: KVKK_ENCRYPTION_KEY
    consent:
      data-processing-required: true
      current-version: "1.0"
    strict-minimization: false
    retention:
      enabled: true
      job-cron: "0 0 2 * * ?"
      users-days: 30
      invoices-days: 1825
      companies-days: 1825
      audit-logs-days: 3650
      notifications-days: 90
      rule-logs-days: 365
    audit-masking:
      enabled: true

  security:
    password:
      bcrypt-strength: 12
    login:
      max-attempts: 5
      lockout-duration-minutes: 15

    rate-limit:
      enabled: true
      public-limit: 20
      login-limit: 5
      authenticated-limit: 500
      upload-limit: 10
      export-limit: 5
      admin-limit: 50
      window-seconds: 60

    headers:
      hsts-enabled: false
      csp-enabled: true

    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001,http://localhost:8082}

    internal-api-key: ${INTERNAL_API_KEY:fatura-ocr-internal-secret-key-2026}

    request:
      max-json-body-size: 1048576 # 1MB

notification:
  email:
    from: no-reply@faturaocr.com
    from-name: Fatura OCR System

vapid:
  public:
    key: "BMk..." # Placeholder for development
  private:
    key: "Kz..." # Placeholder for development
  subject: "mailto:admin@faturaocr.com"

faturaocr:
  openapi:
    dev-url: http://localhost:8082
    staging-url: https://staging-api.faturaocr.com
    prod-url: https://api.faturaocr.com
