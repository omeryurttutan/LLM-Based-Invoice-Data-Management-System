version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: fatura_ocr_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fatura_ocr_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fatura_mq
      RABBITMQ_DEFAULT_PASS: mq_secret_2026
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  extraction-service:
    build: ./extraction-service
    container_name: fatura_ocr_extraction
    env_file:
      - ./extraction-service/.env
    environment:
      - SPRING_BOOT_URL=http://host.docker.internal:8082
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
