version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: fatura_ocr_db
    environment:
      POSTGRES_DB: fatura_ocr
      POSTGRES_USER: fatura
      POSTGRES_PASSWORD: fatura123
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fatura_ocr_redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: fatura_ocr_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: fatura_mq
      RABBITMQ_DEFAULT_PASS: mq_secret_2026
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
